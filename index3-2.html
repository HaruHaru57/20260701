<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
    <title>名前入りおみくじ</title>
        <style>
            .daikitistyle {
                color: red;
                font-weight: bold;
                font-size: 24px;
            }
            .kyostyle {
                color: blue;
                font-style: italic;
            }
        </style>
    </head>


    <body>
         <h1>名前入りおみくじ</h1>
    <p>名前を入力してください:<input id="user-name" type="text" placeholder="例:たろう"></p>

    <button id="btn">占う</button>
    <p id="result">ここに結果が出ます</p>
    


<script>
    let my_button = document.getElementById("btn");
    my_button.addEventListener("click", omikuzi);

    let name_input = document.getElementById("user-name");
    name_input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            omikuzi();
        }
    });

    function omikuzi() {
       let name_input =document.getElementById("user-name");
       let user_name = name_input.value;

        if (user_name === "") {
            user_name = "ゲスト";
        }

        let results = ["大吉", "中吉", "小吉", "吉", "末吉", "凶"];
        let random_number = Math.floor(Math.random() * results.length);

        let result_box = document.getElementById("result");
                result_box.textContent = `${user_name}さんの今日の運勢は... 【${results[random_number]}】 です！`;

        console.log(`[デバッグ] プレイヤー名:${user_name} | 結果:${results[random_number]}`);
    
       result_box.classList.remove("kyostyle", "daikitistyle");

       if (results[random_number] === "大吉") {
            result_box.classList.add("daikitistyle");
       } else if (results[random_number] === "凶") {
            result_box.classList.add("kyostyle");
       }

       name_input.value = " ";
       name_input.focus();
   }
</script>
</body>
</html>
